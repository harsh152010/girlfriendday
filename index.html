<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ek Surprise Tumhare Liye 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --plum-deep: #2c0a1f;
    --plum-mid: #4a1030;
    --wine: #6e1638;
    --rose-gold: #e8a6a0;
    --blush: #f4c9c2;
    --cream: #fff2e6;
    --gold: #d9a566;
    --error: #ff9d8a;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background: radial-gradient(ellipse at top, var(--plum-mid) 0%, var(--plum-deep) 60%, #170410 100%);
    overflow-x:hidden;
    font-family:'Cormorant Garamond', serif;
    color: var(--cream);
  }

  .stars{
    position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.4), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,.5), transparent),
      radial-gradient(1.5px 1.5px at 55% 10%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,.4), transparent);
    background-repeat: repeat;
    background-size: 400px 400px;
    z-index:0;
    opacity:.6;
  }

  .petal{
    position:fixed;
    top:-40px;
    font-size: 16px;
    color: var(--rose-gold);
    opacity:.7;
    pointer-events:none;
    animation: fall linear infinite;
    z-index:1;
  }
  @keyframes fall{
    0%{ transform: translateY(-5vh) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.75; }
    100%{ transform: translateY(105vh) translateX(30px) rotate(360deg); opacity:0; }
  }

  main{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 40px 20px;
  }

  .lock-icon{
    font-size: 40px;
    margin-bottom: 18px;
    opacity:0;
    animation: riseIn .9s ease forwards .1s;
    filter: drop-shadow(0 0 18px rgba(232,166,160,.5));
  }

  .eyebrow{
    letter-spacing: 5px;
    text-transform:uppercase;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 16px;
    opacity: 0;
    animation: riseIn 1s ease forwards .25s;
  }

  h1{
    font-family:'Great Vibes', cursive;
    font-weight:400;
    font-size: clamp(40px, 8vw, 68px);
    color: var(--cream);
    line-height: 1.15;
    text-shadow: 0 0 30px rgba(232,166,160,.4);
    opacity:0;
    animation: riseIn 1.1s ease forwards .45s;
  }

  .sub{
    font-family:'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(14.5px, 2.6vw, 18px);
    color: var(--blush);
    margin-top: 10px;
    max-width: 420px;
    opacity:0;
    animation: riseIn 1s ease forwards .7s;
  }

  @keyframes riseIn{
    from{ opacity:0; transform: translateY(16px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .gate-card{
    margin-top: 44px;
    width: 100%;
    max-width: 360px;
    padding: 38px 32px;
    border: 1px solid rgba(232,166,160,.3);
    border-radius: 16px;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(8px);
    opacity:0;
    animation: riseIn 1s ease forwards .95s;
  }

  .field{ text-align:left; margin-bottom: 22px; }
  .field label{
    display:block;
    font-family:'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .field-input{ position:relative; }
  .field-input input{
    width:100%;
    padding: 13px 44px 13px 16px;
    border-radius: 10px;
    border: 1.5px solid rgba(232,166,160,.3);
    background: rgba(255,242,230,.06);
    color: var(--cream);
    font-family:'Cormorant Garamond', serif;
    font-size: 18px;
    letter-spacing: 3px;
    outline:none;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .field-input input::placeholder{
    color: rgba(255,242,230,.35);
    letter-spacing: normal;
    font-size: 15px;
  }
  .field-input input:focus{
    border-color: var(--rose-gold);
    box-shadow: 0 0 0 3px rgba(232,166,160,.15);
  }
  .field-input input:focus-visible{
    outline: 2px solid var(--rose-gold);
    outline-offset: 2px;
  }

  .toggle-pass{
    position:absolute;
    right: 10px; top:50%;
    transform: translateY(-50%);
    background:none; border:none;
    cursor:pointer;
    font-size: 11px;
    letter-spacing: 1px;
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    color: var(--rose-gold);
  }
  .toggle-pass:focus-visible{ outline:2px solid var(--rose-gold); outline-offset:2px; border-radius:4px; }

  .error-text{
    display:none;
    margin-top: 8px;
    font-size: 13px;
    color: var(--error);
    font-style: italic;
  }
  .field-input.invalid input{ border-color: var(--error); }
  .field-input.invalid + .error-text{ display:block; }

  button.unlock{
    width:100%;
    padding: 14px;
    border:none;
    border-radius: 10px;
    background: linear-gradient(120deg, var(--wine), #8a1f4d);
    color: var(--cream);
    font-family:'Playfair Display', serif;
    font-size: 15.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor:pointer;
    box-shadow: 0 12px 30px rgba(110,22,56,.4);
    transition: transform .15s ease, box-shadow .2s ease;
  }
  button.unlock:hover{ transform: translateY(-2px); box-shadow: 0 16px 36px rgba(110,22,56,.55); }
  button.unlock:active{ transform: translateY(0); }
  button.unlock:focus-visible{ outline:2px solid var(--rose-gold); outline-offset:3px; }

  .hint-below{
    margin-top: 18px;
    font-size: 12.5px;
    color: rgba(255,242,230,.45);
    font-style: italic;
  }

  footer{
    position:relative; z-index:2;
    text-align:center;
    padding: 24px 0 30px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,242,230,.35);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stars"></div>
<div id="petals"></div>

<main>
  <div class="lock-icon">🔒💌</div>
  <div class="eyebrow">Just for you</div>
  <h1>Ek Surprise Tumhare<br>Liye Chhupa Hai</h1>
  <p class="sub">Ye chhota sa taala tum hi khol sakti ho... apna secret word daalo.</p>

  <form class="gate-card" id="gateForm" novalidate method="post" action="/login">
    <div class="field">
      <label for="gatePass">Secret Word</label>
      <div class="field-input" id="gateWrap">
        <input type="password" name="password" id="gatePass" placeholder="jaise humari pehli date ki jagah..." autocomplete="off">
        <button type="button" class="toggle-pass" id="toggleGate">SHOW</button>
      </div>
      <div class="error-text" id="gateError"> ye sahi nahi hai darling — dobara try karo 💭</div>
    </div>
{% if error %}
<div style="color:#ff9d8a; margin-top:10px; text-align:center;">
    {{ error }}
</div>
{% endif %}
    <button type="submit" class="unlock">Kholo Taala</button>
    <p class="hint-below">Hint: sirf tumhe pata hai 😉</p>
  </form>
</main>

<footer>a little something · 1 august</footer>

<script>
  // floating hearts/petals
  const petalContainer = document.getElementById('petals');
  const symbols = ['❤','✿','♥','❁'];
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.fontSize = (11 + Math.random()*13) + 'px';
    p.style.animationDuration = (7 + Math.random()*8) + 's';
    p.style.animationDelay = (Math.random()*10) + 's';
    petalContainer.appendChild(p);
  }

  // show/hide secret word
  const toggleGate = document.getElementById('toggleGate');
  const gatePass = document.getElementById('gatePass');
  toggleGate.addEventListener('click', () => {
    const isPass = gatePass.type === 'password';
    gatePass.type = isPass ? 'text' : 'password';
    toggleGate.textContent = isPass ? 'HIDE' : 'SHOW';
  });

  
</script>

</body>
</html>
